<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JV Linktree</title>
    <!-- Favicon -->
    <link rel="shortcut icon" href="assets/logo.png" type="image/x-icon"/>
    <!-- CSS -->
    <link rel="stylesheet" href="styles/output.css">
</head>

<body class="flex flex-col min-h-screen bg-slate-950 text-white p-4">
    <div class="flex-grow flex items-center justify-center">
        <div class="text-center bg-gray-900 p-12 my-4 rounded-lg">
            <header>
                <img src="assets/perfil_pic.png" alt="profile_picture" class="rounded-full mx-auto  w-48 h-48">
                <h1 class="my-5 text-5xl font-jersey">
                    <span class="text-customgreen">J</span>oão
                    <span class="text-customgreen">V</span>ítor
                </h1>
            </header>

            <div class="btns flex flex-col gap-5 font-jetmono">

                <button type="button" class="bg-white text-black font-bold p-2 text-lg rounded w-72 border-2 border-transparent hover:bg-customgreen  hover:transition duration-300 ease-in-out transform hover:scale-105"  onclick="gotoLink(this)" value="https://github.com/JV1T0R">
                    <i class="fa-brands fa-github text-xl"></i>
                    Github
                </button>
                
                <button type="button" class="bg-white text-black font-bold p-2 text-lg rounded w-72 border-2 border-transparent hover:bg-customgreen hover:transition duration-300 ease-in-out transform hover:scale-105"  onclick="gotoLink(this)" value="https://www.linkedin.com/in/jo%C3%A3opamponet/">
                    <i class="fa-brands fa-linkedin text-xl"></i>
                    Linkedin
                </button>

                <button type="button" class="bg-white text-black font-bold p-2 text-lg rounded w-72 border-2 border-transparent hover:bg-customgreen hover:transition duration-300 ease-in-out transform hover:scale-105" onclick="gotoLink(this)" value="https://joaopamponet.netlify.app/">
                    <i class="fa-solid fa-image-portrait text-xl"></i>
                    Portfolio
                </button>
            </div>
        </div>
    </div>

    <!-- Fontawesome -->
    <script src="https://kit.fontawesome.com/4b62e14f27.js" crossorigin="anonymous"></script>
    <!-- JavaScript -->
     <script src="scripts/main.js"></script>
</body>

</html>
